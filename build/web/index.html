<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- SEO -->
  <title>Aurevia — Luxury Travel, Composed</title>
  <meta name="description" content="Aurevia designs private, cinematic journeys across India and the world — Kerala backwaters, Ladakh expeditions, Maldives overwater villas and Swiss rail odysseys, built by hand.">
  <meta name="keywords" content="luxury travel, tour packages, Kerala tours, Kashmir tours, Maldives honeymoon, Bali packages, Switzerland tours, travel agency India">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aurevia.pages.dev/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Aurevia — Luxury Travel, Composed">
  <meta property="og:description" content="Private, cinematic journeys across India and the world, built by hand and run without friction.">
  <meta property="og:image" content="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=75">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Performance: warm up the CDNs the app reads from -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="dns-prefetch" href="https://videos.pexels.com">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Aurevia">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; background: #060F1B; }
    /* Branded splash shown while the engine boots. */
    #aurevia-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #060F1B;
      transition: opacity .6s ease;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #aurevia-splash .wordmark {
      color: #F5F3EE; letter-spacing: .55em; font-weight: 200;
      font-size: 22px; text-indent: .55em;
      animation: aurevia-breathe 2.4s ease-in-out infinite;
    }
    #aurevia-splash .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #C9A227; margin-top: 18px;
      animation: aurevia-pulse 1.2s ease-in-out infinite;
    }
    @keyframes aurevia-breathe { 0%,100% {opacity:.65} 50% {opacity:1} }
    @keyframes aurevia-pulse { 0%,100% {transform:scale(1)} 50% {transform:scale(1.6)} }
  </style>
</head>
<body>
  <div id="aurevia-splash">
    <div class="wordmark">AUREVIA</div>
    <div class="dot"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('aurevia-splash');
      if (!splash) return;
      splash.style.opacity = '0';
      setTimeout(function () { splash.remove(); }, 650);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
