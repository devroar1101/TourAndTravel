name: aurevia
description: "Aurevia — a luxury international travel house. Cinematic Flutter Web experience with Supabase backend."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0

  # UI / responsive / motion
  responsive_framework: ^1.5.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  google_fonts: ^6.2.1
  visibility_detector: ^0.4.0+2

  # Media
  video_player: ^2.9.2
  cached_network_image: ^3.4.1

  # Backend
  supabase_flutter: ^2.8.0
  equatable: ^2.0.5

  # Admin & utilities
  fl_chart: ^1.0.0
  intl: ^0.20.0
  url_launcher: ^6.3.1
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
